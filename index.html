<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contrôle périodique – Scan SN</title>

<style>
:root{
  --ok:#22c55e;
  --ko:#ef4444;
  --bg:#0b1220;
}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:var(--bg);
  color:#fff;
}
.wrap{max-width:900px;margin:auto;padding:12px}
.card{background:#111827;border-radius:14px;padding:14px;margin-bottom:12px}
button{padding:14px;border-radius:12px;border:0;font-weight:700}
.ok{background:var(--ok)}
.ko{background:var(--ko)}
#scanner{width:100%;aspect-ratio:3/4;background:#000;border-radius:14px;overflow:hidden}
#overlay{
  position:fixed;inset:0;display:none;
  align-items:center;justify-content:center;
  text-align:center;font-weight:900;
}
#overlay.ok{background:rgba(34,197,94,.85)}
#overlay.ko{background:rgba(239,68,68,.85)}
.big{font-size:clamp(3rem,8vw,6rem)}
.small{font-size:1.2rem;margin-top:12px}
</style>
</head>

<body>

<div id="overlay">
  <div>
    <div id="overlayTitle" class="big"></div>
    <div id="overlaySub" class="small"></div>
    <button onclick="startScan()">Scanner suivant</button>
  </div>
</div>

<div class="wrap">

<div class="card">
  <h2>Fichiers de contrôle</h2>
  <input type="file" id="files" multiple accept=".xlsx,.xls,.csv,.txt">
  <div id="info"></div>
</div>

<div class="card">
  <div id="scanner"></div>
  <button onclick="startScan()">Scanner</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>

<script>
const MAX_DAYS = 300;
const controls = new Map();
let scanning=false;

function parseDateFR(v){
  if(!v) return null;
  const m=v.match(/(\\d{2})\\/(\\d{2})\\/(\\d{4})/);
  if(!m) return null;
  return new Date(m[3],m[2]-1,m[1]);
}

document.getElementById("files").addEventListener("change",async e=>{
  controls.clear();
  for(const f of e.target.files){
    const buf=await f.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});
    rows.forEach(r=>{
      const sn=String(r[5]||"").trim().replace(/^V/,"");
      const d=parseDateFR(String(r[1]||""));
      if(!sn||!d) return;
      const prev=controls.get(sn);
      if(!prev||d>prev) controls.set(sn,d);
    });
  }
  document.getElementById("info").textContent =
    controls.size+" SN de contrôle chargés";
});

function showResult(ok,sn,msg){
  const o=document.getElementById("overlay");
  o.className=ok?"ok":"ko";
  o.style.display="flex";
  document.getElementById("overlayTitle").textContent=
    ok?"OK":"A CONTRÔLER";
  document.getElementById("overlaySub").textContent=
    sn+" — "+msg;
  beep(ok);
}

function beep(ok){
  const a=new AudioContext();
  const o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);
  o.frequency.value=ok?1000:600;
  o.start();
  g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.15);
  o.stop(a.currentTime+.18);
  if(!ok){
    setTimeout(()=>beep(true),200);
  }
}

function startScan(){
  document.getElementById("overlay").style.display="none";
  if(scanning) return;
  Quagga.init({
    inputStream:{type:"LiveStream",target:"#scanner",
      constraints:{facingMode:"environment"}},
    decoder:{readers:["code_128_reader"]}
  },err=>{
    if(err) return;
    scanning=true;
    Quagga.start();
  });

  Quagga.onDetected(d=>{
    if(!scanning) return;
    scanning=false;
    Quagga.stop();
    const sn=d.codeResult.code.replace(/^V/,"");
    const dc=controls.get(sn);
    if(!dc){
      showResult(false,sn,"jamais contrôlé");
      return;
    }
    const days=(Date.now()-dc)/86400000;
    showResult(days<=MAX_DAYS,sn,
      Math.round(days)+" jours depuis contrôle");
  });
}
</script>
</body>
</html>
